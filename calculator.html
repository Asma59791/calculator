<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALCX — Professional Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --panel: #161616;
    --border: #2a2a2a;
    --accent: #00ff88;
    --accent2: #ff3366;
    --accent3: #ffcc00;
    --text: #e8e8e8;
    --dim: #555;
    --glow: 0 0 20px rgba(0,255,136,0.4);
    --glow2: 0 0 20px rgba(255,51,102,0.4);
  }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,255,136,0.015) 40px, rgba(0,255,136,0.015) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,255,136,0.015) 40px, rgba(0,255,136,0.015) 41px);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,255,136,0.04) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 6px;
    text-shadow: var(--glow);
  }

  .logo span { color: var(--accent2); text-shadow: var(--glow2); }

  .mode-pills {
    display: flex;
    gap: 6px;
  }

  .pill {
    padding: 4px 12px;
    border: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    background: transparent;
  }
  .pill.active, .pill:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,136,0.05);
    text-shadow: 0 0 8px rgba(0,255,136,0.6);
  }

  .calc-shell {
    width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    box-shadow: 
      0 0 0 1px #0a0a0a,
      0 30px 80px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .calc-shell::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
  }

  .corner {
    position: absolute;
    width: 14px;
    height: 14px;
    border-color: var(--accent);
    border-style: solid;
  }
  .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  /* DISPLAY */
  .display-area {
    background: #070707;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .display-area::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,255,136,0.008) 3px, rgba(0,255,136,0.008) 4px
    );
    pointer-events: none;
  }

  .mem-indicators {
    position: absolute;
    top: 12px;
    left: 24px;
    display: flex;
    gap: 8px;
  }

  .mem-ind {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
    transition: all 0.3s;
  }

  .mem-ind.active { color: var(--accent3); text-shadow: 0 0 6px rgba(255,204,0,0.6); }

  .status-bar {
    position: absolute;
    top: 12px;
    right: 24px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .expression {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--dim);
    text-align: right;
    min-height: 20px;
    letter-spacing: 1px;
    margin-bottom: 8px;
    word-break: break-all;
  }

  .main-display {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 52px;
    color: var(--accent);
    text-align: right;
    text-shadow: var(--glow);
    letter-spacing: 2px;
    line-height: 1;
    word-break: break-all;
    transition: all 0.1s;
  }

  .main-display.error { color: var(--accent2); text-shadow: var(--glow2); font-size: 28px; }
  .main-display.small { font-size: 32px; }
  .main-display.xsmall { font-size: 22px; }

  .sub-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #333;
    text-align: right;
    margin-top: 6px;
    letter-spacing: 2px;
  }

  /* HISTORY PANEL */
  .history-panel {
    background: #0c0c0c;
    border-bottom: 1px solid var(--border);
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .history-panel.open { max-height: 150px; overflow-y: auto; }
  .history-panel::-webkit-scrollbar { width: 3px; }
  .history-panel::-webkit-scrollbar-track { background: transparent; }
  .history-panel::-webkit-scrollbar-thumb { background: var(--accent); }

  .history-item {
    padding: 6px 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #444;
    text-align: right;
    cursor: pointer;
    border-bottom: 1px solid #1a1a1a;
    transition: all 0.2s;
  }
  .history-item:hover { color: var(--accent); background: rgba(0,255,136,0.03); }
  .history-item span { color: var(--accent3); }

  /* BUTTONS */
  .btn-grid {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .btn {
    position: relative;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 1px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    transition: all 0.12s;
    user-select: none;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.1), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover::after { opacity: 1; }

  .btn:active {
    transform: scale(0.94);
    border-color: var(--accent);
  }

  .btn.num {
    background: #191919;
    border-color: #252525;
    font-size: 20px;
  }
  .btn.num:hover { border-color: #3a3a3a; background: #1e1e1e; }
  .btn.num:active { background: #232323; }

  .btn.op {
    background: #1a1200;
    border-color: #3a2800;
    color: var(--accent3);
    font-size: 22px;
  }
  .btn.op:hover { border-color: var(--accent3); background: rgba(255,204,0,0.06); }
  .btn.op:active { box-shadow: 0 0 12px rgba(255,204,0,0.3); }

  .btn.fn {
    background: #0d1a14;
    border-color: #1a3326;
    color: var(--accent);
    font-size: 14px;
  }
  .btn.fn:hover { border-color: var(--accent); background: rgba(0,255,136,0.06); }
  .btn.fn:active { box-shadow: var(--glow); }

  .btn.eq {
    background: linear-gradient(135deg, #00aa55, #00ff88);
    border: none;
    color: #000;
    font-weight: 900;
    font-size: 26px;
    box-shadow: 0 4px 20px rgba(0,255,136,0.3);
  }
  .btn.eq:hover { background: linear-gradient(135deg, #00cc66, #00ff99); box-shadow: 0 4px 30px rgba(0,255,136,0.5); }
  .btn.eq:active { transform: scale(0.93); box-shadow: 0 0 30px rgba(0,255,136,0.6); }

  .btn.clr {
    background: #1a0008;
    border-color: #3a0016;
    color: var(--accent2);
    font-size: 14px;
  }
  .btn.clr:hover { border-color: var(--accent2); background: rgba(255,51,102,0.08); }
  .btn.clr:active { box-shadow: var(--glow2); }

  .btn.zero { grid-column: span 2; }

  .btn-label-small {
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--dim);
    position: absolute;
    top: 5px;
    right: 7px;
    letter-spacing: 0;
  }

  /* BOTTOM BAR */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    background: #0d0d0d;
  }

  .bottom-info {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: #2a2a2a;
    letter-spacing: 2px;
  }

  .history-toggle {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .history-toggle:hover { border-color: var(--accent); color: var(--accent); }

  /* SCIENTIFIC MODE */
  .sci-panel {
    display: none;
    padding: 0 20px 0;
  }
  .sci-panel.active { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; padding-bottom: 8px; }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transform: scale(0);
    animation: rippleAnim 0.4s linear;
    pointer-events: none;
  }
  @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

  /* CONVERTER */
  .converter-panel {
    display: none;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: #0c0c0c;
  }
  .converter-panel.active { display: block; }
  .conv-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .conv-select {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    flex: 1;
    cursor: pointer;
  }
  .conv-input {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    padding: 6px 12px;
    flex: 1;
    text-align: right;
  }
  .conv-result {
    font-family: 'Orbitron', monospace;
    font-size: 24px;
    color: var(--accent3);
    text-align: right;
    padding: 8px 0;
    text-shadow: 0 0 10px rgba(255,204,0,0.3);
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  .calc-shell { animation: fadeIn 0.5s ease; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">CALC<span>X</span></div>
    <div class="mode-pills">
      <button class="pill active" onclick="setMode('standard')">STD</button>
      <button class="pill" onclick="setMode('scientific')">SCI</button>
      <button class="pill" onclick="setMode('converter')">CONV</button>
    </div>
  </div>

  <div class="calc-shell" id="calcShell">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- DISPLAY -->
    <div class="display-area">
      <div class="mem-indicators">
        <span class="mem-ind" id="memM">M</span>
        <span class="mem-ind" id="memF">FN</span>
        <span class="mem-ind" id="memRad">DEG</span>
      </div>
      <div class="status-bar">
        <span class="status-dot"></span>
        <span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#2a2a2a;letter-spacing:1px;">READY</span>
      </div>
      <div class="expression" id="expression"></div>
      <div class="main-display" id="mainDisplay">0</div>
      <div class="sub-display" id="subDisplay">CALCX v2.0 // PROFESSIONAL</div>
    </div>

    <!-- HISTORY -->
    <div class="history-panel" id="historyPanel">
      <div id="historyList"></div>
    </div>

    <!-- SCIENTIFIC PANEL -->
    <div class="sci-panel" id="sciPanel">
      <button class="btn fn" onclick="calcSci('sin')">sin<span class="btn-label-small">rad</span></button>
      <button class="btn fn" onclick="calcSci('cos')">cos</button>
      <button class="btn fn" onclick="calcSci('tan')">tan</button>
      <button class="btn fn" onclick="calcSci('log')">log</button>
      <button class="btn fn" onclick="calcSci('ln')">ln</button>
      <button class="btn fn" onclick="calcSci('asin')">sin⁻¹</button>
      <button class="btn fn" onclick="calcSci('acos')">cos⁻¹</button>
      <button class="btn fn" onclick="calcSci('atan')">tan⁻¹</button>
      <button class="btn fn" onclick="calcSci('sqrt')">√x</button>
      <button class="btn fn" onclick="calcSci('cbrt')">∛x</button>
      <button class="btn fn" onclick="calcSci('sq')">x²</button>
      <button class="btn fn" onclick="calcSci('cube')">x³</button>
      <button class="btn fn" onclick="calcSci('inv')">1/x</button>
      <button class="btn fn" onclick="calcSci('pi')">π</button>
      <button class="btn fn" onclick="calcSci('e')">e</button>
      <button class="btn fn" onclick="calcSci('fact')">n!</button>
      <button class="btn fn" onclick="calcSci('pow10')">10ˣ</button>
      <button class="btn fn" onclick="calcSci('abs')">|x|</button>
      <button class="btn fn" onclick="toggleRad()">RAD</button>
      <button class="btn fn" onclick="calcSci('exp')">eˣ</button>
    </div>

    <!-- MAIN BUTTONS -->
    <div class="btn-grid" id="btnGrid">
      <!-- Row 1 -->
      <button class="btn clr" onclick="memoryOp('mc')">MC</button>
      <button class="btn clr" onclick="memoryOp('mr')">MR</button>
      <button class="btn clr" onclick="memoryOp('m+')">M+</button>
      <button class="btn clr" onclick="memoryOp('m-')">M−</button>
      <button class="btn clr" onclick="clearAll()">AC<span class="btn-label-small">ALL</span></button>
      <!-- Row 2 -->
      <button class="btn fn" onclick="inputChar('(')">( )</button>
      <button class="btn fn" onclick="percentage()">%</button>
      <button class="btn fn" onclick="backspace()">⌫</button>
      <button class="btn op" onclick="inputOperator('/')">÷</button>
      <button class="btn fn" onclick="clearEntry()">CE</button>
      <!-- Row 3 -->
      <button class="btn num" onclick="inputDigit('7')">7</button>
      <button class="btn num" onclick="inputDigit('8')">8</button>
      <button class="btn num" onclick="inputDigit('9')">9</button>
      <button class="btn op" onclick="inputOperator('*')">×</button>
      <button class="btn fn" onclick="toggleSign()">±</button>
      <!-- Row 4 -->
      <button class="btn num" onclick="inputDigit('4')">4</button>
      <button class="btn num" onclick="inputDigit('5')">5</button>
      <button class="btn num" onclick="inputDigit('6')">6</button>
      <button class="btn op" onclick="inputOperator('-')">−</button>
      <button class="btn fn" onclick="inputChar('**')">xʸ</button>
      <!-- Row 5 -->
      <button class="btn num" onclick="inputDigit('1')">1</button>
      <button class="btn num" onclick="inputDigit('2')">2</button>
      <button class="btn num" onclick="inputDigit('3')">3</button>
      <button class="btn op" onclick="inputOperator('+')">+</button>
      <button class="btn eq" onclick="calculate()" style="grid-row: span 2; height:124px">=</button>
      <!-- Row 6 -->
      <button class="btn num zero" onclick="inputDigit('0')">0</button>
      <button class="btn num" onclick="inputDot()">.</button>
      <button class="btn fn" onclick="inputChar('E+')">EXP</button>
    </div>

    <!-- CONVERTER -->
    <div class="converter-panel" id="converterPanel">
      <div class="conv-row">
        <select class="conv-select" id="convType" onchange="updateConverter()">
          <option value="length">LENGTH</option>
          <option value="weight">WEIGHT</option>
          <option value="temp">TEMPERATURE</option>
          <option value="area">AREA</option>
          <option value="speed">SPEED</option>
          <option value="data">DATA</option>
        </select>
      </div>
      <div class="conv-row">
        <input class="conv-input" id="convInput" type="number" value="1" oninput="updateConverter()">
        <select class="conv-select" id="convFrom" onchange="updateConverter()"></select>
      </div>
      <div style="text-align:center;color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:12px;margin:4px 0">▼ CONVERTS TO ▼</div>
      <div class="conv-row">
        <select class="conv-select" id="convTo" onchange="updateConverter()"></select>
      </div>
      <div class="conv-result" id="convResult">—</div>
    </div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
      <span class="bottom-info">CALCX // PRO EDITION</span>
      <button class="history-toggle" onclick="toggleHistory()">▲ HISTORY</button>
    </div>
  </div>
</div>

<script>
let display = '0';
let expression = '';
let lastResult = null;
let memory = 0;
let history = [];
let isRad = true;
let newInput = true;
let parenCount = 0;
let currentMode = 'standard';

const mainDisp = document.getElementById('mainDisplay');
const exprDisp = document.getElementById('expression');
const subDisp = document.getElementById('subDisplay');
const memM = document.getElementById('memM');
const memRad = document.getElementById('memRad');

function updateDisplay() {
  mainDisp.className = 'main-display';
  if (display.length > 14) mainDisp.classList.add('xsmall');
  else if (display.length > 10) mainDisp.classList.add('small');
  mainDisp.textContent = formatNumber(display);
  exprDisp.textContent = expression;
}

function formatNumber(val) {
  if (val === 'Error' || val === 'Infinity' || val === 'NaN') return val;
  let n = parseFloat(val);
  if (isNaN(n)) return val;
  if (Math.abs(n) >= 1e15) return n.toExponential(6);
  return val;
}

function inputDigit(d) {
  if (newInput) { display = d; newInput = false; }
  else { if (display === '0' && d !== '.') display = d; else display += d; }
  updateDisplay();
}

function inputDot() {
  if (newInput) { display = '0.'; newInput = false; }
  else if (!display.includes('.')) display += '.';
  updateDisplay();
}

function inputOperator(op) {
  expression += display + ' ' + op + ' ';
  newInput = true;
  updateDisplay();
}

function inputChar(ch) {
  if (ch === '(' ) {
    expression += '(';
    parenCount++;
    newInput = true;
  } else if (ch === 'E+') {
    display += 'e+';
  } else {
    expression += display + ' ' + ch + ' ';
    newInput = true;
  }
  updateDisplay();
}

function clearAll() {
  display = '0'; expression = ''; newInput = true; parenCount = 0;
  mainDisp.className = 'main-display';
  updateDisplay();
}

function clearEntry() {
  display = '0'; newInput = true; updateDisplay();
}

function backspace() {
  if (display.length > 1) display = display.slice(0, -1);
  else display = '0';
  updateDisplay();
}

function toggleSign() {
  if (display !== '0') display = display.startsWith('-') ? display.slice(1) : '-' + display;
  updateDisplay();
}

function percentage() {
  display = String(parseFloat(display) / 100);
  updateDisplay();
}

function calculate() {
  if (!expression && display === '0') return;
  let expr = expression + display;
  // Close open parens
  for (let i = 0; i < parenCount; i++) expr += ')';
  
  let histExpr = expr;
  try {
    // Safe eval
    let result = Function('"use strict"; return (' + expr.replace(/×/g,'*').replace(/÷/g,'/') + ')')();
    if (!isFinite(result)) { showError('OVERFLOW'); return; }
    result = Math.round(result * 1e12) / 1e12;
    history.unshift({ expr: histExpr, result });
    if (history.length > 20) history.pop();
    renderHistory();
    display = String(result);
    lastResult = result;
    expression = '';
    parenCount = 0;
    newInput = true;
    mainDisp.className = 'main-display';
    updateDisplay();
    subDisp.textContent = '= ' + result;
  } catch(e) {
    showError('SYNTAX ERROR');
  }
}

function showError(msg) {
  display = msg;
  mainDisp.className = 'main-display error';
  mainDisp.textContent = msg;
  expression = '';
  newInput = true;
  parenCount = 0;
  setTimeout(() => { clearAll(); }, 2000);
}

function calcSci(fn) {
  let val = parseFloat(display);
  let result;
  const toRad = isRad ? 1 : Math.PI/180;
  switch(fn) {
    case 'sin': result = Math.sin(val * toRad); break;
    case 'cos': result = Math.cos(val * toRad); break;
    case 'tan': result = Math.tan(val * toRad); break;
    case 'asin': result = Math.asin(val) / toRad; break;
    case 'acos': result = Math.acos(val) / toRad; break;
    case 'atan': result = Math.atan(val) / toRad; break;
    case 'log': result = Math.log10(val); break;
    case 'ln': result = Math.log(val); break;
    case 'sqrt': result = Math.sqrt(val); break;
    case 'cbrt': result = Math.cbrt(val); break;
    case 'sq': result = val * val; break;
    case 'cube': result = val * val * val; break;
    case 'inv': result = 1/val; break;
    case 'pi': result = Math.PI; break;
    case 'e': result = Math.E; break;
    case 'fact': result = factorial(Math.round(val)); break;
    case 'pow10': result = Math.pow(10, val); break;
    case 'abs': result = Math.abs(val); break;
    case 'exp': result = Math.exp(val); break;
  }
  if (result === undefined || isNaN(result)) { showError('DOMAIN ERROR'); return; }
  result = Math.round(result * 1e12) / 1e12;
  display = String(result);
  newInput = true;
  updateDisplay();
}

function factorial(n) {
  if (n < 0 || n > 170) return Infinity;
  if (n <= 1) return 1;
  return n * factorial(n - 1);
}

function toggleRad() {
  isRad = !isRad;
  memRad.textContent = isRad ? 'RAD' : 'DEG';
  memRad.classList.toggle('active', !isRad);
}

function memoryOp(op) {
  switch(op) {
    case 'mc': memory = 0; memM.classList.remove('active'); break;
    case 'mr': display = String(memory); newInput = true; updateDisplay(); break;
    case 'm+': memory += parseFloat(display); memM.classList.add('active'); break;
    case 'm-': memory -= parseFloat(display); memM.classList.add('active'); break;
  }
}

function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = history.map(h =>
    `<div class="history-item" onclick="loadHistory('${h.result}')">
      ${h.expr} <span>= ${h.result}</span>
    </div>`
  ).join('');
}

function loadHistory(val) {
  display = String(val);
  newInput = true;
  updateDisplay();
}

function toggleHistory() {
  const panel = document.getElementById('historyPanel');
  const btn = document.querySelector('.history-toggle');
  panel.classList.toggle('open');
  btn.textContent = panel.classList.contains('open') ? '▼ HISTORY' : '▲ HISTORY';
}

// MODE SWITCHING
function setMode(mode) {
  document.querySelectorAll('.pill').forEach((p,i) => {
    p.classList.toggle('active', ['standard','scientific','converter'][i] === mode);
  });
  currentMode = mode;
  document.getElementById('sciPanel').classList.toggle('active', mode === 'scientific');
  document.getElementById('converterPanel').classList.toggle('active', mode === 'converter');
  if (mode === 'converter') setupConverter();
}

// CONVERTER
const convData = {
  length: {
    units: ['m','km','cm','mm','in','ft','yd','mi','nmi'],
    toBase: [1,1000,0.01,0.001,0.0254,0.3048,0.9144,1609.344,1852]
  },
  weight: {
    units: ['kg','g','mg','lb','oz','t','stone'],
    toBase: [1,0.001,1e-6,0.453592,0.0283495,1000,6.35029]
  },
  temp: {
    units: ['°C','°F','K'],
    toBase: null
  },
  area: {
    units: ['m²','km²','cm²','ft²','in²','acre','hectare'],
    toBase: [1,1e6,0.0001,0.092903,0.000645,4046.86,10000]
  },
  speed: {
    units: ['m/s','km/h','mph','knot','ft/s'],
    toBase: [1,0.277778,0.44704,0.514444,0.3048]
  },
  data: {
    units: ['B','KB','MB','GB','TB','Bit'],
    toBase: [1,1024,1048576,1073741824,1099511627776,0.125]
  }
};

function setupConverter() {
  const type = document.getElementById('convType').value;
  const data = convData[type];
  ['convFrom','convTo'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = data.units.map(u => `<option value="${u}">${u}</option>`).join('');
  });
  document.getElementById('convTo').selectedIndex = 1;
  updateConverter();
}

function updateConverter() {
  const type = document.getElementById('convType').value;
  const from = document.getElementById('convFrom').value;
  const to = document.getElementById('convTo').value;
  const val = parseFloat(document.getElementById('convInput').value);
  const data = convData[type];
  let result;
  if (type === 'temp') {
    const c = from === '°C' ? val : from === '°F' ? (val-32)*5/9 : val-273.15;
    result = to === '°C' ? c : to === '°F' ? c*9/5+32 : c+273.15;
  } else {
    const fromIdx = data.units.indexOf(from);
    const toIdx = data.units.indexOf(to);
    result = val * data.toBase[fromIdx] / data.toBase[toIdx];
  }
  result = Math.round(result * 1e8) / 1e8;
  document.getElementById('convResult').textContent = result + ' ' + to;
}

// RIPPLE
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', function(e) {
    const r = document.createElement('span');
    r.className = 'ripple';
    r.style.cssText = `width:60px;height:60px;left:${e.offsetX-30}px;top:${e.offsetY-30}px`;
    this.appendChild(r);
    setTimeout(() => r.remove(), 400);
  });
});

// KEYBOARD
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
  else if (e.key === '.') inputDot();
  else if (e.key === '+') inputOperator('+');
  else if (e.key === '-') inputOperator('-');
  else if (e.key === '*') inputOperator('*');
  else if (e.key === '/') { e.preventDefault(); inputOperator('/'); }
  else if (e.key === 'Enter' || e.key === '=') calculate();
  else if (e.key === 'Backspace') backspace();
  else if (e.key === 'Escape') clearAll();
  else if (e.key === '%') percentage();
  else if (e.key === '(') inputChar('(');
});

updateDisplay();
setupConverter();
</script>
